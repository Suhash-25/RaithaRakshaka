<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PragnaVistara Learning</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;font-family:Outfit,sans-serif;overflow:hidden;color:#fff}#stage{width:100%;height:100%;position:relative;overflow:hidden}#bg{position:absolute;inset:0;transition:background 1.2s}.scene{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;padding:5% 8%;text-align:center}#playScreen{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center}#playScreen h1{font-size:clamp(24px,5vw,60px);font-weight:900;margin-bottom:10px}#playScreen p{font-size:clamp(13px,2vw,22px);margin-bottom:40px;opacity:.7}#playBtn{border:none;color:#fff;font-family:Outfit,sans-serif;font-weight:900;font-size:clamp(15px,2.5vw,26px);padding:18px 52px;border-radius:60px;cursor:pointer;transition:transform .25s,box-shadow .25s;display:flex;align-items:center;gap:12px}#playBtn:hover{transform:scale(1.1) translateY(-4px)}.scene h2{font-size:clamp(20px,4vw,52px);font-weight:900;margin-bottom:clamp(14px,3vw,36px);line-height:1.2}.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:clamp(14px,2.5vw,28px) clamp(16px,3vw,36px);margin:8px 0;width:100%;max-width:680px;font-size:clamp(14px,1.8vw,22px);line-height:1.6;color:#e2e8f0;opacity:0;transform:translateX(-50px);text-align:left}.card strong{color:#60a5fa}.eq{font-size:clamp(22px,4vw,52px);font-weight:900;opacity:0;transform:scale(.5);margin:10px 20px;display:inline-block}.bar-wrap{display:flex;gap:12px;align-items:flex-end;justify-content:center;margin-top:20px}.bar{border-radius:6px 6px 0 0;width:clamp(36px,6vw,80px);opacity:0;transform:scaleY(0);transform-origin:bottom}.node{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:clamp(10px,1.4vw,16px);opacity:0;transform:scale(.3)}.recap{max-width:700px;padding:40px;background:rgba(255,255,255,.05);border-radius:28px;border:1px solid rgba(255,255,255,.15)}#controls{position:absolute;bottom:0;left:0;width:100%;height:52px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);z-index:50;display:flex;align-items:center;padding:0 20px;gap:14px;opacity:0;pointer-events:none}#pw{flex:1;height:5px;background:rgba(255,255,255,.2);border-radius:3px;cursor:pointer}#pf{height:100%;width:0%;border-radius:3px}#tm{font-size:13px;font-weight:700;color:#94a3b8;font-variant-numeric:tabular-nums}.cb{background:none;border:none;color:#fff;cursor:pointer;opacity:.7;display:flex;transition:opacity .2s,transform .2s}.cb:hover{opacity:1;transform:scale(1.2)}.cb svg{width:22px;height:22px;fill:currentColor}</style></head><body id="body"><div id="stage"><div id="bg"></div><div id="s1" class="scene"></div><div id="s2" class="scene"></div><div id="s3" class="scene"></div><div id="s4" class="scene"></div><div id="s5" class="scene"></div><div id="playScreen"><h1 id="ph1"></h1><p id="pp"></p><button id="playBtn"><svg viewBox="0 0 24 24" fill="white" width="28" height="28"><path d="M8 5v14l11-7z"/></svg><span id="pbtext">START LEARNING</span></button></div><div id="controls"><button class="cb" id="pauseBtn"><svg id="picoP" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg><svg id="picoR" style="display:none" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button><div id="pw"><div id="pf"></div></div><div id="tm">0:00</div><button class="cb" id="replayBtn"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button></div></div><scr
